<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — EverDraft</title>
    <meta name="description" content="Sign in to your EverDraft account." />
    <link rel="icon" type="image/png" href="/favicon/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true"></div>

    <header class="navbar">
      <a href="/" class="brand" aria-label="EverDraft home">
        <img src="/favicon/favicon.png" alt="EverDraft logo" class="brand-logo" />
      </a>
      <nav aria-label="Primary navigation" class="social-nav">
        <a href="/journal" class="nav-link">Journal</a>
        <a href="/#waitlist" class="nav-link nav-link-primary">Join the Waitlist</a>
      </nav>
    </header>

    <main class="auth-main">
      <section class="auth-panel" aria-labelledby="login-title">
        <p class="eyebrow">EVERDRAFT ACCOUNT</p>
        <h1 id="login-title">Sign In</h1>
        <p class="hero-copy">
          Account access is available for early profile testing. EverDraft is still preparing for launch.
        </p>

        <form id="loginForm" class="auth-form">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <button type="submit" id="loginButton">Sign In</button>
          <p id="loginStatus" class="form-status" aria-live="polite"></p>
        </form>

        <p class="auth-switch">Need an account for testing? <a href="/signup/">Sign up</a>.</p>
      </section>
    </main>

    <script type="module" src="/login/login.js"></script>
  </body>
</html>
