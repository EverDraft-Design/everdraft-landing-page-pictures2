<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Chapters — EverDraft</title>
    <meta name="description" content="Manage private EverDraft chapter drafts." />
    <link rel="icon" type="image/png" href="/favicon/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true"></div>

    <header class="navbar">
      <a href="/" class="brand" aria-label="EverDraft home">
        <img src="/favicon/favicon.png" alt="EverDraft logo" class="brand-logo" />
      </a>
      <nav aria-label="Primary navigation" class="social-nav">
        <a href="/my/stories/" class="nav-link">My Stories</a>
        <a href="/#waitlist" class="nav-link nav-link-primary">Join the Waitlist</a>
      </nav>
    </header>

    <main class="auth-main story-main">
      <section class="auth-panel story-panel" aria-labelledby="chapters-title">
        <p class="eyebrow">PRIVATE CHAPTERS</p>
        <h1 id="chapters-title">Story Chapters</h1>
        <p id="storyTitle" class="hero-copy">Loading story...</p>

        <div id="readerNotice" class="notice-panel" hidden>
          You can only manage chapters for stories you created.
        </div>

        <div id="missingNotice" class="notice-panel" hidden>
          This story was not found, or it does not belong to your account.
        </div>

        <div id="chapterActions" class="story-actions" hidden>
          <a id="newChapterLink" class="button-link" href="/my/stories/">Create New Chapter</a>
        </div>

        <div id="chapterList" class="story-list" aria-live="polite"></div>
        <p id="chaptersStatus" class="form-status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/my/stories/chapters/chapters-index.js"></script>
  </body>
</html>
