<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Story — EverDraft</title>
    <meta name="description" content="Create private EverDraft story metadata." />
    <link rel="icon" type="image/png" href="/favicon/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true"></div>

    <header class="navbar">
      <a href="/" class="brand" aria-label="EverDraft home">
        <img src="/favicon/favicon.png" alt="EverDraft logo" class="brand-logo" />
      </a>
      <nav aria-label="Primary navigation" class="social-nav">
        <a href="/my/stories/" class="nav-link">My Stories</a>
        <a href="/#waitlist" class="nav-link nav-link-primary">Join the Waitlist</a>
      </nav>
    </header>

    <main class="auth-main story-main">
      <section class="auth-panel story-panel" aria-labelledby="new-story-title">
        <p class="eyebrow">NEW STORY</p>
        <h1 id="new-story-title">Create Story Metadata</h1>
        <p class="hero-copy">
          Start with the story shell. Chapter tools are coming later.
        </p>

        <div id="readerNotice" class="notice-panel" hidden>
          Please sign in and complete your profile to continue.
        </div>

        <form id="storyForm" class="auth-form story-form" hidden>
          <label for="title">Title</label>
          <input id="title" name="title" type="text" required />

          <label for="slug">Slug</label>
          <input id="slug" name="slug" type="text" placeholder="auto-generated from title if blank" />

          <label for="blurb">Blurb</label>
          <textarea id="blurb" name="blurb" rows="4"></textarea>

          <div class="form-grid">
            <div>
              <label for="genre">Genre</label>
              <input id="genre" name="genre" type="text" />
            </div>
            <div>
              <label for="status">Status</label>
              <select id="status" name="status">
                <option value="draft">Draft</option>
                <option value="ongoing">Ongoing</option>
                <option value="complete">Complete</option>
                <option value="hiatus">Hiatus</option>
                <option value="archived">Archived</option>
              </select>
            </div>
          </div>

          <label for="coverUrl">Cover URL</label>
          <input id="coverUrl" name="coverUrl" type="url" />

          <label for="bannerUrl">Banner URL</label>
          <input id="bannerUrl" name="bannerUrl" type="url" />

          <button type="submit" id="saveStoryButton">Create Story</button>
          <p id="storyStatus" class="form-status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script type="module" src="/my/stories/new/new-story.js"></script>
  </body>
</html>
