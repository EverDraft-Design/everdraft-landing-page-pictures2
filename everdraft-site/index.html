<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EverDraft — Launching Soon</title>
    <meta
      name="description"
      content="EverDraft is launching soon — a premium platform for writers and readers. Join the waitlist for beta access."
    />
    <link rel="icon" type="image/png" href="/favicon/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true"></div>

    <header class="navbar">
      <a href="#" class="brand" aria-label="EverDraft home">
        <img
          src="/assets/favicon/favicon.png"
          src="/favicon/favicon.png"
          alt="EverDraft logo"
          class="brand-logo"
          onerror="this.style.display='none';this.nextElementSibling.style.display='inline';"
        />
          <span 
            class="brand-text">EverDraft</span>
      </a>
      <nav aria-label="Social links" class="social-nav">
        <a href="#" aria-label="EverDraft on X" class="social-icon">✦</a>
        <a href="#" aria-label="EverDraft on Instagram" class="social-icon">◉</a>
        <a href="#" aria-label="EverDraft on Discord" class="social-icon">☽</a>
      </nav>
    </header>

    <main>

        <p class="eyebrow">LAUNCHING SOON</p>
        <h1 id="hero-title">A New Chapter Begins Soon</h1>
        <p class="hero-copy">
          Your first draft does not need to be perfect. It needs a reader.</p>
          EverDraft is a new platform for writers and readers to find their community.</p>
          Dust off your drafts, connect with readers, gain invaluable feedback and grow your confidence.
        </p>

        <form id="heroForm" class="hero-form" novalidate>
          <label for="heroEmail" class="sr-only">Email address</label>
          <input id="heroEmail" name="email" type="email" placeholder="Enter your email" required />
          <button type="submit" id="notifyButton">Join the Waitlist</button>
        </form>
      </section>
